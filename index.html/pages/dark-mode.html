<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Mode</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f0ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
transition:.4s;
}

.container{
width:500px;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,.2);
text-align:center;
transition:.4s;
}

h1{
color:#6A0DAD;
margin-bottom:30px;
}

.switch-box{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#f3ecff;
border-radius:10px;
margin-bottom:30px;
font-size:20px;
}

.switch{
position:relative;
display:inline-block;
width:60px;
height:34px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
transition:.4s;
border-radius:34px;
}

.slider:before{
position:absolute;
content:"";
height:26px;
width:26px;
left:4px;
bottom:4px;
background:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background:#6A0DAD;
}

input:checked + .slider:before{
transform:translateX(26px);
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.save{
background:#6A0DAD;
color:white;
}

.save:hover{
background:#4B0082;
}

.back{
background:#777;
color:white;
}

.back:hover{
background:#555;
}

/* Dark Theme */

.dark{
background:#1f1f1f;
}

.dark .container{
background:#2f2f2f;
color:white;
}

.dark h1{
color:#bb86fc;
}

.dark .switch-box{
background:#444;
}

</style>

</head>

<body id="body">

<div class="container">

<h1>🌙 Dark Mode</h1>

<div class="switch-box">

<span>Enable Dark Mode</span>

<label class="switch">

<input type="checkbox" id="toggle">

<span class="slider"></span>

</label>

</div>

<button class="save" onclick="saveTheme()">
💾 Save Theme
</button>

<button class="back" onclick="window.location.href='settings.html'">
⬅ Back to Settings
</button>

</div>

<script>

const toggle=document.getElementById("toggle");

toggle.addEventListener("change",function(){

document.getElementById("body").classList.toggle("dark");

});

function saveTheme(){

if(toggle.checked){
alert("🌙 Dark Mode Enabled Successfully!");
}
else{
alert("☀️ Light Mode Enabled Successfully!");
}

}

</script>

</body>
</html>
